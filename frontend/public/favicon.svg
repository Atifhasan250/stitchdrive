<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="icon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,1)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.8)"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Stitch/link icon: two overlapping circles with connecting path -->
  <circle cx="12" cy="13" r="4.5" stroke="url(#icon)" stroke-width="2" fill="none"/>
  <circle cx="20" cy="19" r="4.5" stroke="url(#icon)" stroke-width="2" fill="none"/>
  <path d="M15.5 10.5 L16.5 21.5" stroke="url(#icon)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
